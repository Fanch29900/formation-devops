name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      sha: ${{ github.event.workflow_run.head_sha }}
      repo_lower: ${{ steps.repo.outputs.lowercase }}
    steps:
      - id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - run: echo "CI passed for ${{ github.event.workflow_run.head_sha }}"

  # ------------------------------------------------------------------ #
  # Déploiement Staging                                                #
  # ------------------------------------------------------------------ #
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: check
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Deploy to Scaleway instance (staging)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_LOWER: ${{ needs.check.outputs.repo_lower }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ONLY_OWNER=$(echo "${{ env.REPO_LOWER }}" | cut -d/ -f1)
          
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
               cd /opt/app && \
               export GITHUB_REPOSITORY_OWNER=$ONLY_OWNER && \
               export DB_PASSWORD=${{ env.DB_PASSWORD }} && \
               # Etape 1 : On essaie de pull le SHA, sinon on bascule sur latest
               export APP_VERSION=${{ needs.check.outputs.sha }} && \
               if ! docker compose pull api; then
                 echo 'SHA tag not found, falling back to latest'
                 export APP_VERSION=latest
                 docker compose pull api
               fi && \
               # Etape 2 : On lance avec la version qui a fonctionné
               docker compose up -d --no-build"

      - name: Smoke test staging
        run: |
          sleep 10
          curl --fail http://${{ secrets.INSTANCE_IP }}/api/health

  # ------------------------------------------------------------------ #
  # Déploiement Production                                             #
  # ------------------------------------------------------------------ #
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [check, deploy-staging]
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Deploy to Scaleway instance (production)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_LOWER: ${{ needs.check.outputs.repo_lower }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ONLY_OWNER=$(echo "${{ env.REPO_LOWER }}" | cut -d/ -f1)
          
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
               cd /opt/app && \
               export GITHUB_REPOSITORY_OWNER=$ONLY_OWNER && \
               export DB_PASSWORD=${{ env.DB_PASSWORD }} && \
               # Etape 1 : On essaie de pull le SHA, sinon on bascule sur latest
               export APP_VERSION=${{ needs.check.outputs.sha }} && \
               if ! docker compose pull api; then
                 echo 'SHA tag not found, falling back to latest'
                 export APP_VERSION=latest
                 docker compose pull api
               fi && \
               # Etape 2 : On lance avec la version qui a fonctionné
               docker compose up -d --no-build"

      - name: Verify production health
        run: |
          sleep 10
          curl --fail http://${{ secrets.INSTANCE_IP }}/api/health