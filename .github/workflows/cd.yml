name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      sha: ${{ github.event.workflow_run.head_sha }}
      # On exporte aussi le nom du repo en minuscules pour les autres jobs
      repo_lower: ${{ steps.repo.outputs.lowercase }}
    steps:
      - id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - run: echo "CI passed for ${{ github.event.workflow_run.head_sha }}"

  # ------------------------------------------------------------------ #
  # Déploiement Staging                                                #
  # ------------------------------------------------------------------ #
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: check
    environment: staging

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Deploy to Scaleway instance (staging)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On définit le nom en minuscules ici pour l'utiliser dans la commande SSH
          REPO_LOWER: ${{ needs.check.outputs.repo_lower }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
               cd /opt/app && \
               GITHUB_REPOSITORY_OWNER=$(echo $REPO_LOWER | cut -d/ -f1) \
               APP_VERSION=${{ needs.check.outputs.sha }} \
               docker compose up -d --no-build"

      - name: Smoke test staging
        run: |
          sleep 5
          curl --fail http://${{ secrets.INSTANCE_IP }}/api/health

  # ------------------------------------------------------------------ #
  # Déploiement Production                                             #
  # ------------------------------------------------------------------ #
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [check, deploy-staging]
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Deploy to Scaleway instance (production)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_LOWER: ${{ needs.check.outputs.repo_lower }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
               cd /opt/app && \
               docker pull ghcr.io/${{ env.REPO_LOWER }}:${{ needs.check.outputs.sha }} && \
               GITHUB_REPOSITORY_OWNER=$(echo ${{ env.REPO_LOWER }} | cut -d/ -f1) \
               APP_VERSION=${{ needs.check.outputs.sha }} \
               docker compose up -d --no-build"

      - name: Verify production health
        run: |
          sleep 5
          curl --fail http://${{ secrets.INSTANCE_IP }}/api/health